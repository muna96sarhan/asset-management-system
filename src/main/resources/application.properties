spring.application.name=management
# منفذ تشغيل سيرفر الجافا
server.port=8081

# إعدادات الاتصال بقاعدة البيانات MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/asset_management?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234

# تحديث الجداول تلقائياً دون حذف البيانات القديمة
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true